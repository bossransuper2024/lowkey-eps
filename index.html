<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean EPS Vocabulary Mastering</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Korean EPS Vocabulary Mastering</h1>

<!-- MODE MENU -->
<div id="modeMenu">
<h2>Select Mode</h2>
<button class="menu-btn" onclick="setMode(1)">1️⃣ Flashcard</button>
<button class="menu-btn" onclick="setMode(2)">2️⃣ Quiz</button>
<button class="menu-btn" onclick="setMode(3)">3️⃣ Matching</button>
</div>

<!-- CATEGORY MENU -->
<div id="categoryMenu" class="hidden">
<h2>Select Category</h2>
<div id="categories"></div>
<div id="errorMsg" class="error"></div>
<button class="back-btn" onclick="backToMode()">⬅️ Back to Mode</button>
</div>

<!-- FLASHCARD AREA -->
<div id="flashcard" class="hidden">
<h2 id="categoryTitle"></h2>
<div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:10px 0;">
  <button class="back-btn" onclick="backToMode()">⬅️ Back to Mode</button>
  <label style="cursor:pointer;">
    <input type="checkbox" id="randomToggle" /> Random Order
  </label>
  <button class="report-btn" onclick="openReport()">⚠ Report</button>
</div>
<div class="card" id="hangul"></div>
<div class="sub hidden" id="romanization"></div>
<div class="sub hidden" id="meaning" style="font-size:32px; font-weight:bold;"></div>
<div id="tapInfo" class="sub">Tap the word to reveal</div>
<br>
<button onclick="nextWord()">Next</button>
</div>

<!-- MATCH / QUIZ AREA -->
<div id="matchArea" class="hidden">
<h2 id="matchTitle"></h2>
<div id="matchContainer"></div>
<button class="back-btn" onclick="backToMode()">⬅️ Back</button>
</div>

<!-- REPORT MODAL -->
<div id="reportModal" class="report-overlay hidden">
  <div class="report-box">
    <div class="report-header">
      <h3>Report Correction</h3>
      <span onclick="closeReport()" class="close-btn">✕</span>
    </div>
    <textarea id="reportText" placeholder="Describe the grammar issue or correction..."></textarea>
    <button id="sendReportBtn" onclick="sendReport()">Send Report</button>
    <div id="reportStatus" class="status-msg"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
