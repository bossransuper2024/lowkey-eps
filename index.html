<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean EPS Vocabulary Mastering</title>
<style>
/* ===== GENERAL STYLES ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* ===== TITLES ===== */
h1 {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(90deg, #00ffcc, #00aaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
}
h2 {
    font-weight: 500;
    color: #aaa;
    margin-bottom: 20px;
}

/* ===== BUTTONS ===== */
button {
    cursor: pointer;
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    margin: 5px;
    font-weight: 600;
    transition: 0.3s;
}

.menu-btn { background:#1f1f1f; color:#fff; }
.category-btn { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); color: #fff; min-width: 120px; }
.back-btn { background: rgba(255,255,255,0.08); color:#fff; }
.quiz-option, .match-word { background: rgba(255,255,255,0.05); color:#fff; min-width:150px; margin:5px; }

/* Hover effects */
.category-btn:hover, .back-btn:hover, .menu-btn:hover, .quiz-option:hover, .match-word:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg,#00ffcc,#00aaff);
    color:#000;
}

/* ===== FLASHCARD ===== */
.card { 
    margin-top:20px; 
    font-size:48px; 
    font-weight:700; 
    cursor:pointer; 
    user-select:none;
    padding:40px 60px;
    border-radius:25px;
    display:inline-block;
    min-width:280px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}
.sub { font-size:22px; margin-top:10px; color:#00ffcc; }
.hidden { display:none; }

/* ===== REPORT MODAL ===== */
.report-overlay {
  position: fixed; inset:0; background: rgba(0,0,0,0.7);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.report-box {
  background: #111; width: 90%; max-width: 400px; padding: 20px; border-radius: 18px; color: white;
}
.report-box textarea { width:100%; height:100px; margin:10px 0; border-radius:12px; border:none; padding:10px; resize:none; font-size:14px; }
#sendReportBtn { width:100%; padding:10px; border-radius:12px; background: linear-gradient(135deg, #4caf50, #2e7d32); color:#fff; font-weight:bold; }
.status-msg { margin-top:10px; font-size:13px; }

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .card { font-size:32px; padding:20px 30px; min-width:200px; }
    .sub { font-size:18px; }
    button { padding:8px 14px; font-size:14px; }
}
</style>
</head>
<body>
<div class="container">
<h1>Korean EPS Vocabulary Mastering</h1>

<!-- MODE MENU -->
<div id="modeMenu">
<h2>Select Mode</h2>
<button class="menu-btn" onclick="setMode(1)">1️⃣ Flashcard</button>
<button class="menu-btn" onclick="setMode(2)">2️⃣ Quiz</button>
<button class="menu-btn" onclick="setMode(3)">3️⃣ Matching Words</button>
</div>

<!-- CATEGORY MENU -->
<div id="categoryMenu" class="hidden">
<h2>Select Category</h2>
<div id="categories"></div>
<button class="back-btn" onclick="backToMode()">⬅️ Back</button>
</div>

<!-- FLASHCARD / QUIZ / MATCH AREA -->
<div id="flashcard" class="hidden">
<h2 id="categoryTitle"></h2>

<div id="hangul" class="card"></div>
<div id="romanization" class="sub hidden"></div>
<div id="meaning" class="sub hidden"></div>
<div id="tapInfo" class="sub">Tap the word to reveal</div>
<br>
<button onclick="nextWord()">Next</button>
</div>

</div>

<script>
// ===== VOCAB DATA =====
let vocabData = {
"Daily Activities":[
{"hangul":"일하다","romanization":"ilhada","meaning":"to work"},
{"hangul":"공부하다","romanization":"gongbuhada","meaning":"to study"},
{"hangul":"운동하다","romanization":"undonghada","meaning":"to exercise"},
{"hangul":"전화하다","romanization":"jeonhwahada","meaning":"to call (phone)"},
{"hangul":"요리하다","romanization":"yorihada","meaning":"to cook"},
{"hangul":"자다","romanization":"jada","meaning":"to sleep"},
{"hangul":"먹다","romanization":"meokda","meaning":"to eat"}
]
};

// ===== GLOBALS =====
let currentCategory = "";
let currentIndex = 0;
let mode = 1;
let quizQuestions = [];
let matchWords = [];
let matchSelections = [];

// ==== CATEGORY MENU =====
function setMode(selectedMode){
    mode = selectedMode;
    document.getElementById('modeMenu').classList.add('hidden');
    document.getElementById('categoryMenu').classList.remove('hidden');
    loadCategories();
}

function backToMode(){
    document.getElementById('flashcard').classList.add('hidden');
    document.getElementById('categoryMenu').classList.add('hidden');
    document.getElementById('modeMenu').classList.remove('hidden');
}

function loadCategories(){
    let catDiv = document.getElementById('categories');
    catDiv.innerHTML = "";
    for(let cat in vocabData){
        let btn = document.createElement('button');
        btn.className='category-btn';
        btn.innerText = cat;
        btn.onclick = ()=>selectCategory(cat);
        catDiv.appendChild(btn);
    }
}

// ==== SELECT CATEGORY =====
function selectCategory(category){
    currentCategory = category;
    currentIndex = 0;
    document.getElementById('categoryMenu').classList.add('hidden');
    document.getElementById('flashcard').classList.remove('hidden');
    document.getElementById('categoryTitle').innerText = category;

    if(mode === 1){ // Flashcard
        showWord();
    }
    else if(mode === 2){ // Quiz
        startQuiz(); // you need to implement quiz logic similar to flashcard
    }
    else if(mode === 3){ // Matching
        startMatch(); // our matching mode
    }
}

// ===== MODE 1: FLASHCARD =====
function showWord(){
    const words = vocabData[currentCategory];
    if(!words || words.length===0) return;
    const word = words[currentIndex];
    document.getElementById('hangul').innerText = word.hangul;
    document.getElementById('romanization').innerText = `(${word.romanization})`;
    document.getElementById('meaning').innerText = word.meaning;
    document.getElementById('romanization').classList.add('hidden');
    document.getElementById('meaning').classList.add('hidden');
    document.getElementById('tapInfo').style.display='block';
}

document.getElementById('hangul').addEventListener('click', ()=>{
    if(mode===1){
        document.getElementById('romanization').classList.remove('hidden');
        document.getElementById('meaning').classList.remove('hidden');
        document.getElementById('tapInfo').style.display='none';
    }
});

// ===== NEXT BUTTON =====
function nextWord(){
    const words = vocabData[currentCategory];
    if(!words || words.length===0) return;
    currentIndex++;
    if(currentIndex>=words.length) currentIndex=0;

    if(mode===1) showWord();
    else if(mode===2) showQuizQuestion();
    else if(mode===3) startMatch();
}

// ===== MODE 2: QUIZ =====
function startQuiz(){
    const words = vocabData[currentCategory];
    let quizCount = Math.ceil(words.length/2);
    quizQuestions = shuffleArray(words).slice(0,quizCount);
    currentIndex = 0;
    showQuizQuestion();
}

function showQuizQuestion(){
    const q = quizQuestions[currentIndex];
    document.getElementById('hangul').innerText = q.hangul;
    document.getElementById('romanization').className='sub';
    document.getElementById('romanization').innerHTML='';

    let options = [q];
    const allWords = vocabData[currentCategory];
    while(options.length<4){
        let rand = allWords[Math.floor(Math.random()*allWords.length)];
        if(!options.includes(rand)) options.push(rand);
    }
    options = shuffleArray(options);

    let html='';
    options.forEach((o,i)=>{
        html+=`<button class="quiz-option" onclick="checkQuizAnswer(this,${i})">${i+1}. ${o.meaning}</button><br>`;
    });
    document.getElementById('romanization').innerHTML = html;
    q.correctIdx = options.findIndex(o=>o===q);
}

function checkQuizAnswer(btn, selectedIdx){
    const correct = quizQuestions[currentIndex].correctIdx;
    const options = document.querySelectorAll('.quiz-option');
    options.forEach((b,i)=>{
        if(i===correct) b.style.background='linear-gradient(135deg,#4caf50,#2e7d32)';
        else b.style.background='linear-gradient(135deg,#ff4d4d,#ff1a1a)';
        b.disabled=true;
        b.style.color='#fff';
    });
}

// ===== MODE 3: MATCH =====
// ===== MODE 3: MATCH =====
let matchWords = [];
let selectedHangul = null;
let selectedMeaning = null;

function startMatch(){
    const words = shuffleArray(vocabData[currentCategory]).slice(0,5);
    matchWords = words.map(w=>({hangul:w.hangul, meaning:w.meaning, matched:false}));

    // Shuffle hangul and meaning separately for "rumble"
    const hangulShuffled = shuffleArray(matchWords.map((w,i)=>({text:w.hangul, index:i})));
    const meaningShuffled = shuffleArray(matchWords.map((w,i)=>({text:w.meaning, index:i})));

    renderMatchWords(hangulShuffled, meaningShuffled);
}

function renderMatchWords(hangulShuffled, meaningShuffled){
    let hangulHTML='', meaningHTML='';

    hangulShuffled.forEach((w,i)=>{
        hangulHTML+=`<button class="match-word" data-type="hangul" data-index="${w.index}" onclick="selectMatch(this)">${w.text}</button><br>`;
    });

    meaningShuffled.forEach((w,i)=>{
        meaningHTML+=`<button class="match-word" data-type="meaning" data-index="${w.index}" onclick="selectMatch(this)">${w.text}</button><br>`;
    });

    // Add back button
    hangulHTML+=`<br><button class="back-btn" onclick="backToCategoryFromMatch()">⬅️ Back</button>`;

    document.getElementById('hangul').innerHTML = hangulHTML;
    document.getElementById('romanization').innerHTML = meaningHTML;
    document.getElementById('romanization').classList.remove('hidden');
}

function selectMatch(btn){
    const type = btn.dataset.type;
    const index = parseInt(btn.dataset.index);

    if(type==='hangul') selectedHangul = {btn, index};
    if(type==='meaning') selectedMeaning = {btn, index};

    if(selectedHangul && selectedMeaning){
        // Check match
        if(selectedHangul.index === selectedMeaning.index){
            selectedHangul.btn.style.background = '#4caf50';
            selectedMeaning.btn.style.background = '#4caf50';
            matchWords[index].matched = true;
        } else {
            // Wrong match -> rumble
            shakeButton(selectedHangul.btn);
            shakeButton(selectedMeaning.btn);
        }
        selectedHangul=null;
        selectedMeaning=null;

        // Check if all matched
        if(matchWords.every(w=>w.matched)){
            revealAllMatches();
        }
    }
}

function revealAllMatches(){
    document.querySelectorAll('.match-word').forEach(btn=>{
        btn.style.background='#00ffcc';
    });
    setTimeout(()=>alert('✅ All matched!'),300);
}

// Shake animation
function shakeButton(btn){
    btn.style.animation='shake 0.3s';
    btn.addEventListener('animationend',()=>btn.style.animation='');
}

// Back button function
function backToCategoryFromMatch(){
    document.getElementById('flashcard').classList.add('hidden');
    document.getElementById('categoryMenu').classList.remove('hidden');
}

// Utility function
function shuffleArray(array){
    let arr = [...array];
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

</script>
</body>
</html>
